name: Web Scraping CI Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Mondays at 06:00 UTC

jobs:
  python-scrape:
    name: Python HTML Scraping (Selenium/BS4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 149.0.7827.155
          install-chromedriver: true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run HTML scraping script
        run: python src/Web_scraping_with_Python.py

      - name: Upload scraped data
        uses: actions/upload-artifact@v7
        with:
          name: python-scrape-data
          path: data/
          retention-days: 30

  python-graphql:
    name: Python GraphQL Query
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run GraphQL query script
        run: python src/query_wastewater_python.py

      - name: Upload query results
        uses: actions/upload-artifact@v7
        with:
          name: python-graphql-data
          path: data/
          retention-days: 30

  r-scrape:
    name: R HTML Scraping (rvest)
    runs-on: ubuntu-latest
    container:
      image: rocker/tidyverse:4.4
    steps:
      - uses: actions/checkout@v7

      - name: Run R scraping script
        run: Rscript src/Web_scraping_with_R.R

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: r-scrape-data
          path: data/
          retention-days: 30

  r-graphql:
    name: R GraphQL Query
    runs-on: ubuntu-latest
    container:
      image: rocker/tidyverse:4.4
    steps:
      - uses: actions/checkout@v4

      - name: Run R GraphQL query script
        run: Rscript src/query_wastewater_R.R

      - name: Upload query results
        uses: actions/upload-artifact@v4
        with:
          name: r-graphql-data
          path: data/
          retention-days: 30
