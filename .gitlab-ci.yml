stages:
  - graphql

# --- GraphQL Jobs ---

python-graphql:
  stage: graphql
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir -r requirements.txt
  script:
    - python src/query_wastewater_python.py
  artifacts:
    paths:
      - data/
    expire_in: 30 days

r-graphql:
  stage: graphql
  image: rocker/tidyverse:4.4
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libcurl4-openssl-dev libssl-dev
  script:
    - Rscript src/query_wastewater_R.R
  artifacts:
    paths:
      - data/
    expire_in: 30 days
