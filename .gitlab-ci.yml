stages:
  - scrape
  - graphql

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# --- HTML Scraping Jobs ---

python-scrape:
  stage: scrape
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends wget gnupg2 unzip curl
    - wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -
    - echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
    - apt-get update && apt-get install -y --no-install-recommends google-chrome-stable
    - pip install --no-cache-dir -r requirements.txt
  script:
    - python src/Web_scraping_with_Python.py
  artifacts:
    paths:
      - data/
    expire_in: 30 days

r-scrape:
  stage: scrape
  image: rocker/tidyverse:4.4
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libxml2-dev libcurl4-openssl-dev libssl-dev
    - Rscript -e "install.packages('renv', repos='https://cloud.r-project.org')"
    - Rscript -e "renv::restore()"
  script:
    - Rscript src/Web_scraping_with_R.R
  artifacts:
    paths:
      - data/
    expire_in: 30 days

# --- GraphQL Jobs ---

python-graphql:
  stage: graphql
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir -r requirements.txt
  script:
    - python src/query_wastewater_python.py
  artifacts:
    paths:
      - data/
    expire_in: 30 days

r-graphql:
  stage: graphql
  image: rocker/tidyverse:4.4
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libcurl4-openssl-dev libssl-dev
    - Rscript -e "install.packages('renv', repos='https://cloud.r-project.org')"
    - Rscript -e "renv::restore()"
  script:
    - Rscript src/query_wastewater_R.R
  artifacts:
    paths:
      - data/
    expire_in: 30 days
